<script>
    const canvas = document.getElementById('sig-canvas');
    const ctx = canvas.getContext('2d');
    let drawing = false;

    canvas.width = canvas.offsetWidth;
    canvas.height = canvas.offsetHeight;

    function getPos(e) {
        const rect = canvas.getBoundingClientRect();
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        return { x: clientX - rect.left, y: clientY - rect.top };
    }

    function start(e) { drawing = true; ctx.beginPath(); draw(e); }
    function stop() { drawing = false; }
    function draw(e) {
        if (!drawing) return;
        const pos = getPos(e);
        ctx.lineWidth = 3; ctx.lineCap = 'round'; ctx.strokeStyle = '#000';
        ctx.lineTo(pos.x, pos.y); ctx.stroke(); ctx.moveTo(pos.x, pos.y);
        if (e.cancelable) e.preventDefault();
    }

    canvas.addEventListener('mousedown', start);
    canvas.addEventListener('mousemove', draw);
    window.addEventListener('mouseup', stop);
    canvas.addEventListener('touchstart', start);
    canvas.addEventListener('touchmove', draw);
    canvas.addEventListener('touchend', stop);

    function clearCanvas() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        document.getElementById('main-sig-img').style.display = 'none';
    }

    function saveSignature() {
        const dataURL = canvas.toDataURL();
        const img = document.getElementById('main-sig-img');
        img.src = dataURL; img.style.display = 'block';
    }

    function downloadJPG() {
        const area = document.getElementById('capture-area');
        html2canvas(area, { useCORS: true, scale: 2 }).then(canvas => {
            const link = document.createElement('a');
            link.download = 'NACH_Form_Filled.jpg';
            link.href = canvas.toDataURL("image/jpeg", 0.9);
            link.click();
        });
    }

    // UPDATED LOGIC FOR COPY-PASTE AND UPPERCASE
    document.addEventListener("input", function(e){
        // Permanent Uppercase for all inputs
        e.target.value = e.target.value.toUpperCase();

        if(e.target.classList.contains("auto") && e.target.value.length == 1){
            let next = e.target.nextElementSibling;
            if(next && next.classList.contains("auto")) next.focus();
        }
    });

    document.addEventListener("keydown", function(e){
        if(e.target.classList.contains("auto")){
            if(e.key==="Backspace" && e.target.value===""){
                let prev = e.target.previousElementSibling;
                if(prev && prev.classList.contains("auto")) prev.focus();
            }
        }
    });

    // PASTE LOGIC FOR GRID BOXES
    document.addEventListener("paste", function(e) {
        if (e.target.classList.contains("auto")) {
            e.preventDefault();
            const pasteData = (e.clipboardData || window.clipboardData).getData('text').toUpperCase();
            let currentInput = e.target;
            
            for (let i = 0; i < pasteData.length; i++) {
                if (currentInput && currentInput.classList.contains("auto")) {
                    currentInput.value = pasteData[i];
                    currentInput = currentInput.nextElementSibling;
                } else {
                    break;
                }
            }
            if (currentInput) currentInput.focus();
        }
    });
</script>
